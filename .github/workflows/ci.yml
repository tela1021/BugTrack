name: CI

on:
  pull_request:
  push:
    branches: [main, master]

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bugtrack_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d bugtrack_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/bugtrack_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@127.0.0.1:5432/bugtrack_ci?schema=public
      NEXTAUTH_URL: http://127.0.0.1:3008
      NEXTAUTH_SECRET: ci-nextauth-secret-must-have-at-least-32-characters
      AUTH_TRUST_HOST: 'true'
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run db:validate
      - run: npx prisma migrate deploy
      - run: npm test
      - run: npm run lint -- --quiet
      - run: npm run typecheck
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
